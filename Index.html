<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For B2 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-x: hidden;
  background: linear-gradient(270deg, #ffe6f0, #fff, #ffd1e6);
  background-size: 600% 600%;
  animation: gradientBG 15s ease infinite;
}

@keyframes gradientBG {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

#main {
  display: none;
  padding: 20px;
}

h1 {
  color: #ff3366;
  margin-bottom: 20px;
}

.message {
  max-width: 600px;
  margin: auto;
  font-size: 18px;
  line-height: 1.6;
  color: #444;
}

#surpriseBtn {
  font-size: 24px;
  padding: 20px 40px;
  background: linear-gradient(90deg, #ff3366, #ff66aa);
  color: white;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  transition: transform 0.2s, box-shadow 0.2s;
}

#surpriseBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

/* Balloons */
.balloon {
  position: fixed;
  bottom: -100px;
  width: 40px;
  height: 60px;
  border-radius: 50%;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  100% {transform: translateY(-120vh);}
}

/* Confetti */
.confetti {
  position: fixed;
  font-size: 16px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  0% {transform: translateY(-10px);}
  100% {transform: translateY(100vh);}
}

/* Floating hearts/kisses */
.floating-heart {
  position: fixed;
  bottom: -50px;
  font-size: 24px;
  animation: floatHeart 5s linear infinite;
}

@keyframes floatHeart {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
}

/* Typewriter effect */
.typewriter {
  display: inline-block;
  border-right: 2px solid #ff3366;
  white-space: nowrap;
  overflow: hidden;
  font-size: 18px;
  margin-bottom: 20px;
}

#end-buttons {
  display: none;
  margin-top: 20px;
}

#end-buttons button {
  font-size: 20px;
  padding: 10px 20px;
  margin: 0 10px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: #ff66aa;
  color: white;
  transition: transform 0.2s;
}

#end-buttons button:hover {
  transform: scale(1.1);
}

#final-msg {
  font-size: 20px;
  color: #ff3366;
  margin-top: 20px;
  display: none;
}

/* Sparkles */
.sparkle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: yellow;
  border-radius: 50%;
  opacity: 0.8;
  pointer-events: none;
  animation: sparkleAnim 1s linear infinite;
}

@keyframes sparkleAnim {
  0% {transform: translate(0,0) scale(1); opacity:1;}
  50% {transform: translate(-2px,-2px) scale(0.5); opacity:0.5;}
  100% {transform: translate(2px,2px) scale(1); opacity:0;}
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <h2>This is a safe link 😭</h2>
  <p>I promise I'm not here to hack you…</p>
  <p>Love you 💖</p>
  <button id="surpriseBtn" onclick="start()">Click here for a surprise 🎉</button>
</div>

<!-- MAIN -->
<div id="main">
<h1>🎉 Happy Birthday, B2 🎉</h1>

<div class="message">
  <p id="typewriter" class="typewriter"></p>
</div>

<p id="end-question" style="display:none; font-size:18px; margin-top:20px; color:#ff3366;">
Did you enjoy your surprise? 💖
</p>

<div id="end-buttons">
  <button onclick="finalMessage('yes')">Yes 💖</button>
  <button onclick="finalMessage('no')">No 😢</button>
</div>

<p id="final-msg"></p>
</div>

<audio id="popSound" src="https://freesound.org/data/previews/341/341695_5260877-lq.mp3"></audio>

<script>
const messageText = `
I know you don’t really celebrate your birthday like that, but I couldn’t let today pass without saying this…  
I’m really glad you were born. The world became a little better the day you came into it, and I truly mean that.  
You might not see this day as something special, but to me it is — because it gave me you.  
And I’m genuinely grateful that you exist, and that somehow, our paths crossed.  
You matter more than you probably think… and I hope one day you see yourself the way I see you 💖  
I just wish I could be there with you today, but for now… I hope the waves of Chicago will bring you to me soon 🌊💖  
And maybe this is just me saying 831 in my own way… I hope you figure that out.  
Sending you lots of hugs 🤗 and kisses 💋💖.
`;

function typeWriterEffect(text, element, delay=30) {
  let i = 0;
  function typing() {
    if (i < text.length) {
      element.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, delay);
    } else {
      document.getElementById("end-question").style.display = "block";
      document.getElementById("end-buttons").style.display = "block";
    }
  }
  typing();
}

function start() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.display = "block";

  // Pop sound
  document.getElementById("popSound").play();

  // Balloons with sparkles
  for(let i=0;i<10;i++){
    let b = document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.background="hsl("+Math.random()*360+",80%,70%)";
    document.body.appendChild(b);

    // Sparkle trail
    setInterval(() => {
      let s = document.createElement("div");
      s.className = "sparkle";
      s.style.left = b.offsetLeft + Math.random()*20 - 10 + "px";
      s.style.top = b.offsetTop + Math.random()*20 - 10 + "px";
      document.body.appendChild(s);
      setTimeout(() => { s.remove(); }, 1000);
    }, 100);
  }

  // Confetti
  let shapes = ["💖","⭐","🎉","💋"];
  for(let i=0;i<50;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.innerText = shapes[Math.floor(Math.random()*shapes.length)];
    c.style.fontSize = Math.random()*20 + "px";
    document.body.appendChild(c);
  }

  // Floating hearts/kisses
  let hearts = ["💖","💋","😘"];
  for(let i=0;i<20;i++){
    let h = document.createElement("div");
    h.className = "floating-heart";
    h.style.left = Math.random()*100 + "vw";
    h.innerText = hearts[Math.floor(Math.random()*hearts.length)];
    document.body.appendChild(h);
  }

  // Typewriter message
  const typeEl = document.getElementById("typewriter");
  typeWriterEffect(messageText, typeEl, 30);
}

function finalMessage(answer){
  const msg = document.getElementById("final-msg");
  if(answer === "yes"){
    msg.innerText = "Yay! I’m so glad you enjoyed it 💖🎉";
  } else {
    msg.innerText = "Oh no 😢… I’ll try even harder next time!";
  }
  msg.style.display = "block";
}
</script>

</body>
</html>
