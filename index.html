<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For B2 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: black;
  color: white;
}

/* 🌊 OCEAN BACKGROUND */
.wave-bg {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 200%;
  height: 200px;
  background: linear-gradient(to top, #0a2a43, transparent);
  opacity: 0.4;
  animation: waveMove 6s linear infinite;
  z-index: 0;
}

@keyframes waveMove {
  from {transform: translateX(0);}
  to {transform: translateX(-50%);}
}

/* FLOATING PARTICLES */
.particle {
  position: fixed;
  width: 4px;
  height: 4px;
  background: #8fd3ff;
  border-radius: 50%;
  opacity: 0.5;
  animation: floatUp 8s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity: 0;}
  50% {opacity: 1;}
  100% {transform: translateY(-120vh); opacity: 0;}
}

/* INTRO */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a3b5d, #000);
  text-align: center;
  padding: 20px;
  position: relative;
  z-index: 2;
}

h1 { color: #8fd3ff; }

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  text-align: center;
  margin-top: 10px;
}

button {
  font-size: 18px;
  padding: 12px 25px;
  background: #8fd3ff;
  color: black;
  border: none;
  border-radius: 12px;
  margin-top: 15px;
  cursor: pointer;
}

/* MAIN */
#main {
  display: none;
  padding: 20px;
  background: radial-gradient(circle, #0a0f1f, #000);
  min-height: 100vh;
  position: relative;
  z-index: 2;
}

h1 {
  color: #8fd3ff;
  text-shadow: 0 0 15px #4da6ff;
}

/* MESSAGE */
#msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}

.line {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1.2s ease;
  margin: 12px 0;
  max-width: 600px;
  text-align: center;
  color: #d0eaff;
  font-size: 17px;
  filter: blur(2px);
}

.line.show {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0);
}

/* FINAL SCREEN */
#finalScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #000, #050a14);
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  padding: 20px;
  z-index: 10;
}

#finalScreen h2 {
  color: #8fd3ff;
  font-size: 20px;
  line-height: 1.7;
  animation: fadeIn 2s ease;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

/* YES NO */
#question, #buttons {
  display: none;
  margin-top: 20px;
}

</style>
</head>

<body>

<div class="wave-bg"></div>

<!-- INTRO -->
<div id="intro">
  <h1>💙 Before We Begin…</h1>

  <p>Type your name 👇</p>
  <input id="nameInput" placeholder="Enter your name">

  <button onclick="checkName()">Enter 🎉</button>

  <p id="response" style="color:#d0eaff;"></p>

  <button id="continueBtn" onclick="start()" style="display:none;">
    Click for a surprise 🎉
  </button>
</div>

<!-- MAIN -->
<div id="main">
<h1>🎉 Happy Birthday, B2 🎉</h1>

<div id="msg"></div>

<p id="question" style="color:#8fd3ff;">Did you enjoy your surprise? 💙</p>

<div id="buttons">
<button onclick="answer('yes')">Yes 💙</button>
<button onclick="answer('no')">No 😢</button>
</div>

<p id="reply"></p>
</div>

<!-- FINAL -->
<div id="finalScreen">
  <h2>
i hope the waves of chicago bring you to me soon 🌊💙<br><br>
i love you so much…<br>
but until then i'll keep loving you from a distance 🥹<br><br>
— from Bree with love
  </h2>
</div>

<audio id="popSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c7f.mp3">
</audio>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b6c1f5d3a.mp3">
</audio>

<script>

const lines = [
"I know you don’t usually celebrate birthdays…",
"But I couldn’t let this day pass without you knowing this.",
"I’m really glad you were born 💙",
"You make the world softer just by existing.",
"You matter more than you think.",
"And I hope one day you see yourself the way I see you.",
"I wish I could be there with you today…",
"But for now, let this be your moment.",
"Maybe this is me saying 831 in my own way 💙"
];

/* PARTICLES */
for(let i=0;i<30;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  p.style.animationDuration=(3+Math.random()*5)+"s";
  document.body.appendChild(p);
}

/* NAME CHECK */
function checkName(){
  let name = document.getElementById("nameInput").value.toLowerCase();
  let res = document.getElementById("response");
  let btn = document.getElementById("continueBtn");

  if(name.includes("noble")){
    res.innerText =
    "Wait… Noble Badia? 😭💙\nThat sounds like a CEO who forgot it’s his own birthday… 😏🎂";
  } else {
    res.innerText =
    "Hmm… that’s not the name I expected 😏💙\nBut you still get the surprise anyway.";
  }

  btn.style.display = "inline-block";
}

/* START */
function start(){

  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";

  document.getElementById("popSound").play();

  let music = document.getElementById("music");
  music.volume = 0;
  music.play();

  // fade music in
  let v = 0;
  let fade = setInterval(()=>{
    if(v < 0.6){
      v += 0.05;
      music.volume = v;
    } else {
      clearInterval(fade);
    }
  },200);

  showLines();
}

/* MESSAGE FLOW */
function showLines(){
  let container = document.getElementById("msg");

  lines.forEach((text,i)=>{
    setTimeout(()=>{
      let p=document.createElement("div");
      p.className="line";
      p.innerText=text;
      container.appendChild(p);

      setTimeout(()=>p.classList.add("show"),100);

      if(i === lines.length-1){
        setTimeout(finalStep, 1500);
      }

    }, i*1400);
  });
}

/* FINAL FLOW */
function finalStep(){

  let c = document.getElementById("msg");

  let chicago = document.createElement("div");
  chicago.className="line";
  chicago.innerText="i hope the waves of chicago bring you to me soon 🌊💙";
  c.appendChild(chicago);

  setTimeout(()=>chicago.classList.add("show"),200);

  setTimeout(()=>{
    let last = document.createElement("div");
    last.className="line";
    last.innerText="i love you so much… but until then i'll keep loving you from a distance 🥹 — from Bree";
    c.appendChild(last);

    setTimeout(()=>last.classList.add("show"),200);

    setTimeout(()=>{
      document.getElementById("question").style.display="block";
      document.getElementById("buttons").style.display="block";
      document.getElementById("finalScreen").style.display="flex";
    },2500);

  },2000);
}

function answer(a){
  document.getElementById("reply").innerText =
  a==="yes"
  ? "💙 I’m really happy you liked it 🎉"
  : "💙 I’ll make it even better next time 😢";
}

</script>

</body>
</html>
