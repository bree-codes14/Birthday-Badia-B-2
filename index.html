<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For B2 💙</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  text-align: center;
  overflow-x: hidden;
}

#envelopeScreen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a3b5d, #000);
}

#envelope {
  font-size: 90px;
  cursor: pointer;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

#intro {
  display: none;
  height: 100vh;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(circle, #0a2a43, #000);
}

h1 { color: #8fd3ff; }

input {
  width: 80%;
  max-width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  margin-top: 12px;
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  background: #8fd3ff;
  color: black;
  font-size: 16px;
  cursor: pointer;
}

#main {
  display: none;
  padding: 20px;
  min-height: 100vh;
  background: radial-gradient(circle, #0a0f1f, #000);
}

.line {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s ease;
  margin: 12px auto;
  max-width: 90%;
  color: #d0eaff;
}

.line.show {
  opacity: 1;
  transform: translateY(0);
}

#finalScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: black;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

#finalScreen h2 {
  color: #8fd3ff;
  font-size: 18px;
  line-height: 1.6;
}

/* 📅 POPUP */
#popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 1px solid #8fd3ff;
  padding: 12px 16px;
  border-radius: 10px;
  display: none;
  color: #8fd3ff;
  font-size: 14px;
  z-index: 999;
}

/* 🎈 BALLOONS */
.balloon {
  position: fixed;
  bottom: -100px;
  font-size: 30px;
  animation: floatUp 6s linear forwards;
  z-index: 9999;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-120vh); opacity: 0; }
}

/* 🎂 CAKE */
#cakeScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #0a0f1f, black);
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10000;
}

#cake {
  font-size: 120px;
  animation: popCake 1s ease forwards;
}

@keyframes popCake {
  from { transform: scale(0); }
  to { transform: scale(1); }
}

#cakeScreen h2 {
  margin-top: 10px;
  color: #8fd3ff;
}
</style>
</head>

<body>

<div id="popup"></div>

<!-- 💌 ENVELOPE -->
<div id="envelopeScreen">
  <div id="envelope" onclick="openEnvelope()">💌</div>
  <p style="color:#8fd3ff;">Tap the envelope to open your surprise</p>
</div>

<!-- 📱 INTRO -->
<div id="intro">
  <h1>💙 Before We Begin…</h1>

  <p>Type your name</p>
  <input id="nameInput" placeholder="Enter your name">

  <button onclick="start()">Click for surprise 🎉</button>

  <p id="response"></p>
</div>

<!-- 🎬 MAIN -->
<div id="main">
<h1>🎉 Happy Birthday B2 🎉</h1>
<div id="msg"></div>

<p id="question" style="display:none;">Did you enjoy it? 💙</p>

<div id="buttons" style="display:none;">
<button onclick="answer('yes')">Yes 💙</button>
<button onclick="answer('no')">No 😢</button>
</div>

<p id="reply"></p>
</div>

<!-- 💙 FINAL -->
<div id="finalScreen">
<h2>
i hope the waves of chicago bring you to me soon 🌊💙<br><br>
i love you so much…<br>
but until then i'll keep loving you from a distance 🥹<br><br>
— from Bree with love
</h2>
</div>

<!-- 🎂 CAKE -->
<div id="cakeScreen">
  <div id="cake">🎂</div>
  <h2>Happy Birthday B2 💙</h2>
</div>

<script>

let audioCtx;
let musicGain;

/* 🔊 POP */
function popSound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 180;

  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}

/* 🚨 DRRR SOUND */
function emergencySound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "square";
  osc.frequency.value = 650;

  gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

/* 🎈 BALLOONS */
function launchBalloons(){
  const emojis = ["🎈","🎉","💙","🎈","🎊"];

  for(let i=0;i<10;i++){
    let b = document.createElement("div");
    b.className = "balloon";
    b.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    b.style.left = Math.random()*100 + "vw";
    b.style.animationDuration = (4 + Math.random()*3) + "s";

    document.body.appendChild(b);

    setTimeout(()=>b.remove(),7000);
  }
}

/* 📅 POPUP */
function showPopup(msg){
  let p = document.getElementById("popup");
  p.innerText = msg;
  p.style.display = "block";

  emergencySound();
  launchBalloons();

  setTimeout(()=>{
    p.style.display = "none";
  }, 3500);
}

/* 💌 OPEN */
function openEnvelope(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  popSound();

  document.getElementById("envelopeScreen").style.display="none";
  document.getElementById("intro").style.display="flex";
}

/* 🎬 START */
function start(){

  let name = document.getElementById("nameInput").value.trim().toLowerCase();
  let response = document.getElementById("response");

  if(name === "b2" || name === "b 2"){
    response.innerText = "💙 Access granted: Welcome B2…";
    showPopup("📅 CEO ALERT: Check your calendar sir… it’s your birthday 😭🎂");
  } else {
    response.innerText = "😂 That’s not him… try again 😭";
    return;
  }

  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";

  popSound();
  startMusic();
  showLines();
}

/* 🎹 MUSIC */
function startMusic(){
  const notes = [
    264,264,297,264,352,330,
    264,264,297,264,396,352,
    264,264,528,440,352,330,297,
    466,466,440,352,396,352
  ];

  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.6;
  musicGain.connect(audioCtx.destination);

  function loop(){
    let t = audioCtx.currentTime;

    notes.forEach((f,i)=>{
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.value = f;

      gain.gain.setValueAtTime(0.2, t + i*0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + i*0.3 + 0.25);

      osc.connect(gain);
      gain.connect(musicGain);

      osc.start(t + i*0.3);
      osc.stop(t + i*0.3 + 0.3);
    });

    setTimeout(loop, 8000);
  }

  loop();
}

/* 🌫 FADE */
function fadeMusic(){
  let v = musicGain.gain.value;

  let f = setInterval(()=>{
    if(v > 0.001){
      v -= 0.02;
      musicGain.gain.value = v;
    } else clearInterval(f);
  },200);
}

/* ✨ CONFETTI */
function launchConfetti(){
  let end = Date.now() + 3000;

  (function frame(){
    confetti({particleCount:6,spread:80,origin:{y:0.6}});
    if(Date.now() < end) requestAnimationFrame(frame);
  })();
}

/* 💙 TEXT */
let lines = [
"I know you don’t usually celebrate birthdays…",
"But I couldn’t let this day pass without you knowing this.",
"I’m really glad you were born 💙",
"You make the world softer just by existing.",
"You matter more than you think.",
"And I hope one day you see yourself the way I see you.",
"I wish I could be there with you today…",
"But for now, let this be your moment.",
"Maybe this is me saying 831 in my own way 💙"
];

function showLines(){
  let c = document.getElementById("msg");

  lines.forEach((text,i)=>{
    setTimeout(()=>{
      let p = document.createElement("div");
      p.className="line";
      p.innerText=text;
      c.appendChild(p);

      setTimeout(()=>p.classList.add("show"),100);

      if(i === lines.length-1){
        setTimeout(finalStep, 3000);
      }

    }, i*1300);
  });
}

/* 🌊 FINAL */
function finalStep(){
  fadeMusic();

  document.getElementById("question").style.display="block";
  document.getElementById("buttons").style.display="flex";
}

/* 🖱 ANSWER → CAKE */
function answer(a){

  document.getElementById("reply").innerText =
  a==="yes"
  ? "💙 I’m really happy you liked it 🎉"
  : "💙 I’ll make it even better next time 😢";

  setTimeout(()=>{
    document.getElementById("finalScreen").style.display="flex";

    setTimeout(()=>{
      document.getElementById("cakeScreen").style.display="flex";
    }, 2500);

  },2000);
}

</script>

</body>
</html>
