<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>For B2 💙</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: black;
  color: white;
  text-align: center;
}

/* 🌊 BACKGROUND */
.wave {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 200%;
  height: 160px;
  background: linear-gradient(to top, #0a2a43, transparent);
  opacity: 0.4;
  animation: move 6s linear infinite;
  z-index: 0;
}

@keyframes move {
  from {transform: translateX(0);}
  to {transform: translateX(-50%);}
}

/* 📱 INTRO */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 20px;
  background: radial-gradient(circle, #1a3b5d, #000);
  position: relative;
  z-index: 2;
}

h1 {
  color: #8fd3ff;
  font-size: 22px;
}

p {
  font-size: 15px;
}

input {
  width: 80%;
  max-width: 300px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  text-align: center;
  font-size: 16px;
}

button {
  margin-top: 12px;
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  background: #8fd3ff;
  color: black;
  font-size: 16px;
}

/* 🎬 MAIN */
#main {
  display: none;
  padding: 20px;
  min-height: 100vh;
  background: radial-gradient(circle, #0a0f1f, #000);
  position: relative;
  z-index: 2;
}

/* 💙 MESSAGE FLOW */
.line {
  opacity: 0;
  transform: translateY(20px);
  transition: all 1s ease;
  margin: 14px auto;
  max-width: 90%;
  font-size: 15px;
  color: #d0eaff;
}

.line.show {
  opacity: 1;
  transform: translateY(0);
}

/* 💙 QUESTION */
#question {
  display: none;
  margin-top: 25px;
  color: #8fd3ff;
  font-size: 16px;
}

/* 💙 BUTTONS */
#buttons {
  display: none;
  margin-top: 15px;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

#buttons button {
  width: 70%;
}

/* 💬 FINAL SCREEN */
#finalScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #000, #050a14);
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 10;
}

#finalScreen h2 {
  font-size: 18px;
  color: #8fd3ff;
  line-height: 1.6;
}

</style>
</head>

<body>

<div class="wave"></div>

<!-- INTRO -->
<div id="intro">
  <h1>💙 Before We Begin…</h1>

  <p>Type your name 👇</p>

  <input id="nameInput" placeholder="Enter your name">

  <button onclick="checkName()">Enter 🎉</button>

  <p id="response"></p>

  <button id="continueBtn" onclick="start()" style="display:none;">
    Click for a surprise 🎉
  </button>
</div>

<!-- MAIN -->
<div id="main">
<h1>🎉 Happy Birthday B2 🎉</h1>

<div id="msg"></div>

<p id="question">Did you enjoy your surprise? 💙</p>

<div id="buttons">
<button onclick="answer('yes')">Yes 💙</button>
<button onclick="answer('no')">No 😢</button>
</div>

<p id="reply"></p>
</div>

<!-- FINAL -->
<div id="finalScreen">
  <h2>
i hope the waves of chicago bring you to me soon 🌊💙<br><br>
i love you so much…<br>
but until then i'll keep loving you from a distance 🥹<br><br>
— from Bree with love
  </h2>
</div>

<!-- AUDIO -->
<audio id="popSound" preload="auto">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b0c7f.mp3">
</audio>

<audio id="music" loop preload="auto">
  <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7b6c1f5d3a.mp3">
</audio>

<script>

/* 🔓 MOBILE AUDIO UNLOCK */
document.addEventListener("click", () => {
  let m = document.getElementById("music");
  let p = document.getElementById("popSound");

  m.play().then(()=>m.pause()).catch(()=>{});
  p.play().then(()=>p.pause()).catch(()=>{});
}, { once: true });

const lines = [
"I know you don’t usually celebrate birthdays…",
"But I couldn’t let this day pass without you knowing this.",
"I’m really glad you were born 💙",
"You make the world softer just by existing.",
"You matter more than you think.",
"And I hope one day you see yourself the way I see you.",
"I wish I could be there with you today…",
"But for now, let this be your moment.",
"Maybe this is me saying 831 in my own way 💙"
];

function checkName(){
  let name = document.getElementById("nameInput").value.toLowerCase();
  let res = document.getElementById("response");
  let btn = document.getElementById("continueBtn");

  if(name.includes("noble")){
    res.innerText =
    "Wait… Noble Badia? 😭💙\nCEO who forgot it’s his own birthday 😏🎂";
  } else {
    res.innerText =
    "Hmm… wrong name 😏💙 but you still get the surprise.";
  }

  btn.style.display = "inline-block";
}

function start(){

  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";

  let pop = document.getElementById("popSound");
  pop.play().catch(()=>{});

  let music = document.getElementById("music");
  music.play().catch(()=>{});

  // fade music
  music.volume = 0;
  let v = 0;
  let fade = setInterval(()=>{
    if(v < 0.6){
      v += 0.05;
      music.volume = v;
    } else {
      clearInterval(fade);
    }
  },200);

  showLines();
}

function showLines(){
  let container = document.getElementById("msg");

  lines.forEach((text,i)=>{
    setTimeout(()=>{
      let p = document.createElement("div");
      p.className = "line";
      p.innerText = text;
      container.appendChild(p);

      setTimeout(()=>p.classList.add("show"),100);

      if(i === lines.length-1){
        setTimeout(finalStep, 1500);
      }

    }, i*1400);
  });
}

function finalStep(){

  let c = document.getElementById("msg");

  let chicago = document.createElement("div");
  chicago.className="line";
  chicago.innerText="i hope the waves of chicago bring you to me soon 🌊💙";
  c.appendChild(chicago);

  setTimeout(()=>chicago.classList.add("show"),200);

  setTimeout(()=>{
    let last = document.createElement("div");
    last.className="line";
    last.innerText="i love you so much… but until then i'll keep loving you from a distance 🥹 — from Bree";
    c.appendChild(last);

    setTimeout(()=>last.classList.add("show"),200);

    setTimeout(()=>{
      document.getElementById("question").style.display="block";
      document.getElementById("buttons").style.display="flex";
    },2500);

  },2000);
}

function answer(a){
  document.getElementById("reply").innerText =
  a==="yes"
  ? "💙 I’m really happy you liked it 🎉"
  : "💙 I’ll make it even better next time 😢";
}

</script>

</body>
</html>
