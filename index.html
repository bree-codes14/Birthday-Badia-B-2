<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For B2 💙</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  overflow-x: hidden;
  background: black;
  color: white;
}

/* 🎬 INTRO */
#intro {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle, #1a3b5d, #000);
  transition: opacity 1.2s ease;
  text-align: center;
}

#intro h1 {
  color: #8fd3ff;
}

button {
  font-size: 20px;
  padding: 15px 30px;
  background: #8fd3ff;
  color: black;
  border: none;
  border-radius: 12px;
  margin-top: 20px;
  cursor: pointer;
}

/* 🎬 MAIN */
#main {
  display: none;
  padding: 20px;
  background: radial-gradient(circle, #0a0f1f, #000);
  min-height: 100vh;
}

/* TITLE */
h1 {
  color: #8fd3ff;
  text-shadow: 0 0 10px #4da6ff;
}

/* 💙 MESSAGE FLOW (DOWNWARD MOVEMENT) */
#msg {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 20px;
}

.line {
  opacity: 0;
  transform: translateY(-25px);
  transition: all 0.9s ease;
  margin: 12px 0;
  max-width: 600px;
  text-align: center;
  color: #d0eaff;
  font-size: 17px;
}

.line.show {
  opacity: 1;
  transform: translateY(0);
}

/* 💙 HEARTS */
.heart {
  position: fixed;
  font-size: 20px;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% {transform: translateY(0); opacity:1;}
  100% {transform: translateY(-120vh); opacity:0;}
}

/* 🎈 BALLOONS */
.balloon {
  position: fixed;
  bottom: -100px;
  width: 25px;
  height: 40px;
  border-radius: 50%;
  animation: float 7s linear infinite;
}

@keyframes float {
  0% {transform: translateY(0);}
  100% {transform: translateY(-120vh);}
}

/* ✨ FIREWORKS */
.firework {
  position: fixed;
  font-size: 22px;
  animation: boom 1s ease-out forwards;
}

@keyframes boom {
  0% {transform: scale(0); opacity:1;}
  100% {transform: scale(2); opacity:0;}
}

/* 🌊 FINAL SCREEN */
#finalScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, #000, #050a14);
  justify-content: center;
  align-items: center;
  text-align: center;
  flex-direction: column;
  padding: 20px;
}

#finalScreen h2 {
  color: #8fd3ff;
  font-size: 22px;
  max-width: 600px;
  line-height: 1.6;
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

.wave {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: url("https://svgshare.com/i/13p8.svg");
  background-size: cover;
  opacity: 0.3;
  animation: waveMove 6s linear infinite;
}

@keyframes waveMove {
  from {transform: translateX(0);}
  to {transform: translateX(-200px);}
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <h1>💙 A Movie For You…</h1>
  <p>Press play when you're ready</p>
  <button onclick="start()">Play ✨</button>
</div>

<!-- 🎬 MAIN -->
<div id="main">
<h1>🎉 Happy Birthday, B2 🎉</h1>

<div id="msg"></div>

<p id="question" style="display:none; color:#8fd3ff;">
Did you enjoy your surprise? 💙
</p>

<div id="buttons" style="display:none;">
<button onclick="answer('yes')">Yes 💙</button>
<button onclick="answer('no')">No 😢</button>
</div>

<p id="reply"></p>
</div>

<!-- 🌊 FINAL CINEMATIC SCREEN -->
<div id="finalScreen">
  <h2>
i love you so much<br><br>
i hope the waves of chicago bring you to me soon<br><br>
but until then i'll keep loving you from a distance<br><br>
— from Bree with love 🥹
  </h2>
  <div class="wave"></div>
</div>

<!-- 🎶 AUDIO -->
<audio id="popSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0c7f.mp3">
</audio>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7b6c1f5d3a.mp3">
</audio>

<script>

const lines = [
"I know you don’t usually celebrate birthdays…",
"But I couldn’t let this day pass without you knowing this.",
"I’m really glad you were born 💙",
"You make the world softer just by existing.",
"You matter more than you think.",
"And I hope one day you see yourself the way I see you.",
"I wish I could be there with you today…",
"But for now, let this be your moment.",
"Maybe this is me saying 831 in my own way 💙"
];

function start() {

  // 🔊 FIXED POP SOUND (must be inside click)
  const pop = document.getElementById("popSound");
  pop.currentTime = 0;
  pop.play().catch(()=>{});

  const music = document.getElementById("music");
  music.currentTime = 0;
  music.play().catch(()=>{});

  document.getElementById("intro").style.opacity = "0";

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
  },1200);

  // 🎈 balloons
  for(let i=0;i<10;i++){
    let b=document.createElement("div");
    b.className="balloon";
    b.style.left=Math.random()*100+"vw";
    b.style.background="skyblue";
    document.body.appendChild(b);
  }

  showLines();
}

function showLines(){
  let container=document.getElementById("msg");

  lines.forEach((text,i)=>{
    setTimeout(()=>{
      let p=document.createElement("div");
      p.className="line";
      p.innerText=text;
      container.appendChild(p);

      setTimeout(()=>p.classList.add("show"),100);

      createHeart();

      if(i === lines.length-1){
        setTimeout(()=>{
          document.getElementById("question").style.display="block";
          document.getElementById("buttons").style.display="block";
          fireworks();
          showFinal();
        },800);
      }

    }, i*1600);
  });
}

function createHeart(){
  let h=document.createElement("div");
  h.className="heart";
  h.innerText="💙";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}

function fireworks(){
  for(let i=0;i<25;i++){
    let f=document.createElement("div");
    f.className="firework";
    f.innerText="✨";
    f.style.left=Math.random()*100+"vw";
    f.style.top=Math.random()*100+"vh";
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),1000);
  }
}

/* 🌊 FINAL CINEMATIC ENDING */
function showFinal(){
  setTimeout(()=>{
    document.getElementById("finalScreen").style.display="flex";
  }, 4000);
}

function answer(res){
  document.getElementById("reply").innerText =
    res === "yes"
    ? "💙 I’m really happy you liked it 🎉"
    : "💙 I’ll make it even better next time 😢";
}

</script>

</body>
</html>
