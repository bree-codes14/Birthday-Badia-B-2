<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For B2 💙</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow-x: hidden;
  background: black;
}

/* 🌌 MOVING NIGHT SKY */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://i.imgur.com/3ZQ3Z9m.jpg");
  background-size: cover;
  animation: moveSky 20s linear infinite;
  z-index: -1;
  opacity: 0.4;
}

@keyframes moveSky {
  0% { transform: scale(1) translateX(0); }
  50% { transform: scale(1.1) translateX(-20px); }
  100% { transform: scale(1) translateX(0); }
}

/* 💌 ENVELOPE */
#envelopeScreen {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

#envelope {
  font-size: 100px;
  cursor: pointer;
  animation: float 2s ease-in-out infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}

/* 📱 INTRO */
#intro {
  display: none;
  height: 100vh;
  flex-direction: column;
  justify-content: center;
}

input {
  padding: 12px;
  border-radius: 10px;
  border: none;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px 16px;
  border-radius: 10px;
  border: none;
  background: #8fd3ff;
  cursor: pointer;
}

/* 🎬 MAIN */
#main { display:none; padding:20px; }

.line {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
  margin: 10px;
  color: #d0eaff;
}

.line.show {
  opacity: 1;
  transform: translateY(0);
}

/* 🎬 FINAL CINEMATIC */
#finalScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  padding: 20px;
  transform: scale(0.95);
  animation: zoomIn 2s forwards;
}

@keyframes zoomIn {
  to { transform: scale(1); }
}

/* 📅 POPUP */
#popup {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  border: 1px solid #8fd3ff;
  padding: 10px 15px;
  display: none;
}
</style>
</head>

<body>

<div id="popup"></div>

<!-- 💌 ENVELOPE -->
<div id="envelopeScreen">
  <div id="envelope" onclick="openEnvelope()">💌</div>
  <p>tap to open</p>
</div>

<!-- 📱 INTRO -->
<div id="intro">
  <h2>Before we begin 💙</h2>
  <input id="nameInput" placeholder="Enter name">
  <button onclick="start()">Enter</button>
  <p id="response"></p>
</div>

<!-- 🎬 MAIN -->
<div id="main">
<h1>🎉 Happy Birthday B2 🎉</h1>
<div id="msg"></div>

<p id="question" style="display:none;">Did you enjoy it? 💙</p>

<div id="buttons" style="display:none;">
<button onclick="answer('yes')">Yes</button>
<button onclick="answer('no')">No</button>
</div>

<p id="reply"></p>
</div>

<!-- 💙 FINAL -->
<div id="finalScreen">
<h2>
i hope the waves of chicago bring you to me soon 🌊💙<br><br>
everything goes quiet now…<br>
just you and this moment.<br><br>
i love you 🥹💙
</h2>
</div>

<script>

let audioCtx;
let musicGain;

/* 🔊 POP */
function popSound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type="square";
  osc.frequency.value=180;

  gain.gain.setValueAtTime(0.3,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+0.2);
}

/* 🚨 DRRR SOUND */
function emergencySound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type="square";
  osc.frequency.value=600;

  gain.gain.setValueAtTime(0.4,audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime+0.6);
}

/* 💓 HEARTBEAT */
function heartbeat(){
  setInterval(()=>{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.frequency.value=60;
    osc.type="sine";

    gain.gain.setValueAtTime(0.2,audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime+0.2);
  }, 1000);
}

/* 🎹 MUSIC */
function startMusic(){
  const notes=[264,264,297,264,352,330,264,264,297,264,396,352];

  musicGain=audioCtx.createGain();
  musicGain.gain.value=0.5;
  musicGain.connect(audioCtx.destination);

  function loop(){
    let t=audioCtx.currentTime;

    notes.forEach((f,i)=>{
      const osc=audioCtx.createOscillator();
      const gain=audioCtx.createGain();

      osc.frequency.value=f;
      osc.type="sine";

      gain.gain.setValueAtTime(0.2,t+i*0.3);
      gain.gain.exponentialRampToValueAtTime(0.001,t+i*0.3+0.25);

      osc.connect(gain);
      gain.connect(musicGain);

      osc.start(t+i*0.3);
      osc.stop(t+i*0.3+0.3);
    });

    setTimeout(loop,6000);
  }

  loop();
}

/* 🌫 FADE */
function fadeMusic(){
  let v=musicGain.gain.value;

  let f=setInterval(()=>{
    if(v>0.001){
      v-=0.02;
      musicGain.gain.value=v;
    } else clearInterval(f);
  },200);
}

/* ✨ CONFETTI */
function launchConfetti(){
  let end=Date.now()+3000;

  (function frame(){
    confetti({particleCount:6,spread:80,origin:{y:0.6}});
    if(Date.now()<end) requestAnimationFrame(frame);
  })();
}

/* 💌 OPEN */
function openEnvelope(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  popSound();
  document.getElementById("envelopeScreen").style.display="none";
  document.getElementById("intro").style.display="flex";
}

/* 🎬 START */
function start(){

  let name=document.getElementById("nameInput").value.trim().toLowerCase();
  let res=document.getElementById("response");

  if(name==="b2"){
    res.innerText="💙 Access granted… CEO detected 😭";
    showPopup("📅 sir… check your calendar. it's your birthday 💀");
  } else {
    res.innerText="😂 wrong identity";
    return;
  }

  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";

  popSound();
  startMusic();
  heartbeat();
  showLines();
}

/* 📅 POPUP */
function showPopup(msg){
  let p=document.getElementById("popup");
  p.innerText=msg;
  p.style.display="block";

  emergencySound();

  setTimeout(()=>p.style.display="none",4000);
}

/* 💙 TEXT */
let lines=[
"I know you don’t usually celebrate birthdays…",
"But I couldn’t let this day pass without you knowing this.",
"I’m really glad you were born 💙",
"You matter more than you think.",
"And I see you differently…"
];

function showLines(){
  let c=document.getElementById("msg");

  lines.forEach((t,i)=>{
    setTimeout(()=>{
      let d=document.createElement("div");
      d.className="line";
      d.innerText=t;
      c.appendChild(d);
      setTimeout(()=>d.classList.add("show"),100);

      if(i===lines.length-1){
        setTimeout(finalStep,3000);
      }
    },i*1300);
  });
}

/* 🌊 FINAL */
function finalStep(){
  fadeMusic();

  document.getElementById("question").style.display="block";
  document.getElementById("buttons").style.display="flex";
}

/* 🖱 USER DECISION */
function answer(a){

  document.getElementById("reply").innerText=
  a==="yes"
  ?"💙 I’m glad you liked it"
  :"💙 I’ll do better next time";

  setTimeout(()=>{
    document.getElementById("finalScreen").style.display="flex";
    launchConfetti();
  },2000);
}

</script>

</body>
</html>
